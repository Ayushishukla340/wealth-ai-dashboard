<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PulseWealth AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">

    <!-- LEFT -->
    <div class="content">
        <h1>PulseWealth AI</h1>
        <h2>AI Predicting Your Financial Future in Real-Time</h2>

        <p>
            Analyze your spending, predict markets, and automate 
            smart investments with AI.
        </p>

        <button class="cta" onclick="startAI()">🚀 See Your AI Portfolio Grow</button>
        <p class="trust">🔒 Trusted by 10,000+ users • Secure AI Decisions</p>
    </div>

    <!-- RIGHT DASHBOARD -->
    <div class="dashboard">

        <h3>AI Portfolio</h3>

        <div class="card">
            <p>Growth</p>
            <h2 id="growth">+18.6%</h2>
        </div>

        <div class="card">
            <p>Investments</p>
            <h2 id="investment">$12,400</h2>
        </div>

        <div class="card">
            <p>AI Signal</p>
            <h2 id="signal">BUY 📈</h2>
        </div>

    </div>

</div>

<!-- glowing background -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<script src="script.js"></script>

</body>
</html>
